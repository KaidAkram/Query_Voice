version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: queryvoice_postgres
    restart: always
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # This automatically runs any .sql scripts on startup
      - ../data_engineering/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
