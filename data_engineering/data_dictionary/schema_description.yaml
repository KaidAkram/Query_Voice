# query_voice_root/data_engineering/data_dictionary/schema_description.yaml
# Finalized Data Dictionary for QueryVoice v3 (Verified 3-Table SQLite Schema)

database:
  name: queryvoice_local.db
  type: SQLite
  description: "Star Schema tracking retail sales and product performance analytics."

database_scope:
  in_scope:
    - "User analytics: names, countries, signup dates, and premium status."
    - "Product performance: categories (SaaS, Consulting, etc.), prices, and costs."
    - "Sales transactions: revenue, profit, quantity, and timestamps."
  out_of_scope:
    - "General knowledge, weather, sports, or news."
    - "Personal identifiable information beyond what is explicitly in dim_users."
    - "Predictive analytics (forecasting) not supported by raw SQL."

tables:
  - name: dim_users
    description: "User dimension table containing demographics and subscription status."
    columns:
      - name: user_id
        type: TEXT
        description: "Primary Key. Unique identifier for the user."
      - name: name
        type: TEXT
        description: "Full name of the user."
      - name: email
        type: TEXT
        description: "User email address."
      - name: country
        type: TEXT
        description: "Country of residence (e.g., Morocco, USA, Spain)."
      - name: is_premium
        type: BOOLEAN
        description: "Premium subscription status. 1 (TRUE) for premium, 0 (FALSE) for free."
      - name: signup_date
        type: DATE
        description: "The date the user registered."

  - name: dim_products
    description: "Product dimension table containing catalog and cost information."
    columns:
      - name: product_id
        type: TEXT
        description: "Primary Key. Unique identifier for the product."
      - name: product_name
        type: TEXT
        description: "Human-readable product name."
      - name: category
        type: TEXT
        description: "Product category. Valid values: SaaS Subscription, Consulting Hours, Add-on Feature, Enterprise License."
      - name: unit_price
        type: FLOAT
        description: "Standard selling price per unit."
      - name: unit_cost
        type: FLOAT
        description: "Internal cost to produce/provide the unit."

  - name: fact_sales
    description: "Transactional fact table. Revenue and Profit are pre-calculated for performance."
    columns:
      - name: sale_id
        type: TEXT
        description: "Primary Key. Unique transaction ID."
      - name: user_id
        type: TEXT
        description: "Foreign Key linking to dim_users."
      - name: product_id
        type: TEXT
        description: "Foreign Key linking to dim_products."
      - name: sale_timestamp
        type: DATETIME
        description: "Exact date and time of the sale."
      - name: quantity
        type: BIGINT
        description: "Number of units purchased."
      - name: revenue
        type: FLOAT
        description: "Total revenue (Calculated as quantity * unit_price)."
      - name: profit
        type: FLOAT
        description: "Total profit margin (Calculated as revenue - (quantity * unit_cost))."

business_definitions:
  premium_user: "Users where dim_users.is_premium = 1."
  recent_sale: "Transactions where fact_sales.sale_timestamp >= date('now', '-1 month')."
  high_value_product: "Products where dim_products.unit_price > 1000."
  total_revenue: "Calculated using SUM(fact_sales.revenue)."
  total_profit: "Calculated using SUM(fact_sales.profit)."
  average_order_value: "Calculated as SUM(revenue) / COUNT(sale_id)."

sample_queries:
  - question: "Who are our top 5 premium users by profit last month?"
    sql: "SELECT u.name, SUM(f.profit) FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id WHERE u.is_premium = 1 AND f.sale_timestamp >= date('now', '-1 month') GROUP BY u.name ORDER BY SUM(f.profit) DESC LIMIT 5;"
  - question: "Show me the total revenue for 'SaaS Subscription' category in Morocco."
    sql: "SELECT SUM(f.revenue) FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id JOIN dim_products p ON f.product_id = p.product_id WHERE u.country = 'Morocco' AND p.category = 'SaaS Subscription';"
  - question: "What is the average unit price of products sold to users from Spain?"
    sql: "SELECT AVG(p.unit_price) FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id JOIN dim_products p ON f.product_id = p.product_id WHERE u.country = 'Spain';"
  - question: "List the names of products that generated zero profit."
    sql: "SELECT DISTINCT p.product_name FROM fact_sales f JOIN dim_products p ON f.product_id = p.product_id WHERE f.profit <= 0;"
  - question: "How many users signed up before 2024?"
    sql: "SELECT COUNT(*) FROM dim_users WHERE signup_date < '2024-01-01';"
  - question: "What is our most profitable product category?"
    sql: "SELECT p.category, SUM(f.profit) FROM fact_sales f JOIN dim_products p ON f.product_id = p.product_id GROUP BY p.category ORDER BY SUM(f.profit) DESC LIMIT 1;"
  - question: "Show total sales quantity by country for premium users."
    sql: "SELECT u.country, SUM(f.quantity) FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id WHERE u.is_premium = 1 GROUP BY u.country;"
  - question: "What was the total revenue made on 2024-03-15?"
    sql: "SELECT SUM(revenue) FROM fact_sales WHERE sale_timestamp LIKE '2024-03-15%';"
  - question: "List the emails of users who purchased high-value products (>1000)."
    sql: "SELECT DISTINCT u.email FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id JOIN dim_products p ON f.product_id = p.product_id WHERE p.unit_price > 1000;"
  - question: "What is the total profit from Morocco in the last 6 months?"
    sql: "SELECT SUM(f.profit) FROM fact_sales f JOIN dim_users u ON f.user_id = u.user_id WHERE u.country = 'Morocco' AND f.sale_timestamp >= date('now', '-6 month');"
