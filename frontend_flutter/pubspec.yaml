name: query_voice
description: A voice-driven Business Intelligence mobile application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0

  # Networking
  http: ^1.1.0
  dio: ^5.4.0

  # Audio Recording
  record: ^5.0.4
  audioplayers: ^5.2.1

  # State Management
  provider: ^6.1.1

  # Utilities
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  intl: ^0.19.0
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
